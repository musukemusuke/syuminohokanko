name: Run Discord Bot

on:
  push:
    branches: [ main ]
  schedule:
    # 3時間ごとに自動起動して6時間制限を回避する
    - cron: '0 */3 * * *'
  workflow_dispatch: # 手動でいつでも起動できるボタン

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install discord.py

    - name: Start Bot with Timeout
      env:
        DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      run: |
        timeout 9900 python bot.py || true
