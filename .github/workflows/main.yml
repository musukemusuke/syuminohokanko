name: Run Discord Bot

on:
  push:
    branches: [ main ]
  schedule:
    # 3時間ごとに自動起動してバトンを繋ぐ（6時間制限の対策）
    - cron: '0 */3 * * *'
  workflow_dispatch: # 手動で起動できるボタンを追加

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    # ★Nodeの最新環境に完全対応した、バグのない公式部品の最新版に固定
    - name: Checkout code safely
      uses: actions/checkout@v4.2.2

    # ★Nodeの最新環境に完全対応した、公式Python部品の最新版に固定
    - name: Set up Python safely
      uses: actions/setup-python@v5.4.0
      with:
        python-version: '3.11'

    # ボットに必要な部品のインストール
    - name: Install dependencies
      run: |
        pip install discord.py

    # 6時間制限にかかる前に、2時間45分で安全に自己終了させる命令
    - name: Start Bot with Timeout
      env:
        DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
      run: |
        timeout 9900 python bot.py || true
